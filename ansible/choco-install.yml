---
- name: Habilitar WSL2, instalar Docker Desktop e pacotes via Chocolatey
  hosts: windows
  gather_facts: false

  vars:
    docker_package: docker-desktop
    packages_file: "./packages.txt"

    choco_packages: >-
      {{
        lookup('file', packages_file)
        .splitlines()
        | map('trim')
        | reject('match', '^#')
        | reject('equalto', '')
        | list
      }}

  tasks:
    # --- WSL2: habilitar recursos ---
    - name: Habilitar "Windows Subsystem for Linux"
      win_optional_feature:
        name: Microsoft-Windows-Subsystem-Linux
        state: present
        include_parent: yes
      register: wsl1

    - name: Habilitar "VirtualMachinePlatform" (WSL2)
      win_optional_feature:
        name: VirtualMachinePlatform
        state: present
        include_parent: yes
      register: vmp

    - name: Reboot se necessário
      win_reboot:
      when: (wsl1.reboot_required | default(false)) or (vmp.reboot_required | default(false))

    # IMPORTANTE: não calcular changed_when com base no stdout UTF-16
    - name: Definir WSL2 como versão padrão
      win_command: wsl.exe --set-default-version 2
      register: wsl_default_v2
      changed_when: false
      failed_when: wsl_default_v2.rc != 0

    - name: Atualizar kernel do WSL (ignorar erro se não suportado)
      win_command: wsl.exe --update
      register: wsl_update
      changed_when: false
      failed_when: false

    # --- Chocolatey ---
    - name: Garantir Chocolatey presente
      win_chocolatey:
        name: chocolatey
        state: present

    - name: Instalar/atualizar Docker Desktop
      win_chocolatey:
        name: "{{ docker_package }}"
        state: present

    # --- Instalar pacotes do packages.txt ---
    - name: Instalar pacotes adicionais do packages.txt
      win_chocolatey:
        name: "{{ choco_packages }}"
        state: present

    # --- Verificações (somente exibição) ---
    - name: Verificar status do WSL
      win_command: wsl.exe --status
      register: wsl_status
      changed_when: false
      failed_when: false

    - name: Mostrar status do WSL
      debug:
        var: wsl_status.stdout

    - name: Mostrar versão do Docker (se já inicializado)
      win_command: '"C:\Program Files\Docker\Docker\resources\bin\docker.exe" version'
      register: docker_ver
      changed_when: false
      failed_when: false

    - name: Exibir docker version (se disponível)
      debug:
        var: docker_ver.stdout

